# =============================================================================
# GitHub Actions — Build & Deploy to VPS/EC2
# =============================================================================
# Triggers on push to main branch.
# Connects to your server via SSH, pulls latest code, rebuilds, and restarts.
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  DOCKER_BUILDKIT: 1

jobs:
  # ===========================================================================
  # Job 1: Build & Test
  # ===========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit --if-present 2>/dev/null || true

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  # ===========================================================================
  # Job 2: Deploy to Server
  # ===========================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            echo "=== Navigating to project directory ==="
            cd ${{ secrets.PROJECT_PATH || '~/app' }}

            echo "=== Pulling latest changes ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Rebuilding containers ==="
            docker compose down
            docker compose up -d --build --remove-orphans

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Verifying deployment ==="
            sleep 10
            docker compose ps
            echo "=== Deployment complete ==="

      - name: Health Check
        run: |
          echo "Waiting for application to start..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DOMAIN || 'localhost' }} || echo "000")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "⚠️ Health check returned HTTP $STATUS — check server logs"
          fi

# =============================================================================
# Required GitHub Secrets
# =============================================================================
# Go to: Repository → Settings → Secrets and variables → Actions
#
# SERVER_HOST      — Your server IP address (e.g., 52.14.xxx.xxx)
# SERVER_USER      — SSH username (e.g., ubuntu)
# SERVER_SSH_KEY   — Private SSH key (paste the entire key including headers)
# SERVER_PORT      — SSH port (default: 22, optional)
# PROJECT_PATH     — Absolute path to your project on the server (e.g., ~/app)
# DOMAIN           — Your domain name for health check (e.g., yourdomain.com)
# =============================================================================
